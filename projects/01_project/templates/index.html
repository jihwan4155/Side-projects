<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지환의 뉴스 인사이트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/ some.min.css" rel="stylesheet">
    <style>
        .sidebar { height: 100vh; background-color: #f8f9fa; padding: 20px; border-right: 1px solid #dee2e6; }
        .hero-section { background: linear-gradient(45deg, #0d6efd, #0dcaf0); color: white; padding: 40px; border-radius: 15px; margin-bottom: 30px; }
        .news-card { transition: transform 0.2s; cursor: pointer; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 sidebar">
            <h4>⚙️ 설정 센터</h4>
            <hr>
            <p class="text-muted">관리 중인 키워드</p>
            <ul class="list-group mb-3">
                <li class="list-group-item">⚽ 오타니</li>
                <li class="list-group-item">📱 삼성전자</li>
                <li class="list-group-item">🚀 HBF</li>
            </ul>
            <button class="btn btn-outline-primary btn-sm w-100">+ 키워드 추가</button>
        </nav>

        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
            
            <div class="hero-section">
                <h1 class="display-4">🔥 오늘의 핵심 이슈</h1>
                <p class="lead">{{ news_list[0]['title'] if news_list else '수집된 뉴스가 없습니다.' }}</p>
                <button class="btn btn-light">자세히 보기</button>
            </div>

            <div class="row row-cols-1 row-cols-md-3 g-4">
                {% for news in news_list %}
                <div class="col">
                    <div class="card news-card h-100">
                        <div class="card-body">
                            <h5 class="card-title">{{ news['title'] }}</h5>
                            <p class="card-text text-muted small">{{ news['pub_date'] }}</p>
                        </div>
                        <div class="card-footer bg-transparent border-0">
                            <a href="{{ news['link'] }}" target="_blank" class="btn btn-sm btn-primary">뉴스 읽기</a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>

        </main>
    </div>
</div>

</body>
</html>
